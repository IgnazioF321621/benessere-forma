<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Zona Tracker"/>
<meta name="theme-color" content="#F5F3EE"/>
<title>Zona Tracker — Benessere & Forma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{color:#1A1A1A;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased;background:#F5F3EE;}
:root{
  --bg:#F5F3EE;
  --s1:#FFFFFF;
  --s2:#F0EDE6;
  --s3:#E8E4DC;
  --b1:#DDD9D0;
  --b2:#C8C3B8;
  --t1:#1A1A1A;
  --t2:#555047;
  --t3:#9A9388;
  --acc:#2A7A6F;
  --acc-lt:#E6F4F2;
  --acc2:#235F56;
  --carb:#C4880A;
  --carb-lt:#FEF3DC;
  --prot:#2A7A6F;
  --prot-lt:#E6F4F2;
  --fat:#B84C2A;
  --fat-lt:#FCEEE9;
  --ok:#2A7A6F;
  --warn:#C4880A;
  --err:#B84C2A;
  --err-lt:#FCEEE9;
  --r:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px;}
textarea,select,input{-webkit-appearance:none;font-family:'Syne',sans-serif;}
button:active{opacity:.85;transform:scale(.98);}
button:disabled{cursor:not-allowed;opacity:.45;transform:none!important;}
.mono{font-family:'JetBrains Mono',monospace;}

/* LAYOUT */
#app{min-height:100vh;display:flex;flex-direction:column;}
#header{background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:200;padding-top:env(safe-area-inset-top);box-shadow:var(--shadow);}
.h-inner{padding:14px 20px 0;}
.h-brand{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--acc);font-family:'JetBrains Mono',monospace;}
.h-title{font-size:21px;font-weight:800;color:var(--t1);margin:2px 0 12px;letter-spacing:-.5px;}
#nav{display:flex;border-top:1px solid var(--b1);}
.nav-btn{flex:1;padding:11px 0;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;transition:all .2s;}
.nav-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
#main{flex:1;padding-bottom:calc(env(safe-area-inset-bottom)+40px);}
.page{display:none;padding:18px 16px;}
.page.active{display:block;}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-green{border-color:rgba(42,122,111,.25);background:linear-gradient(135deg,#fff 0%,var(--acc-lt) 100%);}
.card-warn{border-color:rgba(196,136,10,.25);background:linear-gradient(135deg,#fff 0%,var(--carb-lt) 100%);}
.lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:10px;display:block;}

/* FORMS */
.inp{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:11px 13px;color:var(--t1);font-size:14px;font-family:'Syne',sans-serif;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--acc);background:#fff;}
textarea.inp{resize:vertical;min-height:76px;line-height:1.55;}
select.inp{cursor:pointer;}
.inp-sm{padding:7px 11px;font-size:13px;}

/* BUTTONS */
.btn{padding:11px 18px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;font-weight:500;transition:all .15s;box-shadow:var(--shadow);}
.btn-primary{background:var(--acc);color:#fff;font-weight:700;}
.btn-primary:hover{background:var(--acc2);}
.btn-ghost{background:var(--s2);color:var(--t2);border:1px solid var(--b1);}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc);}
.btn-danger{background:var(--err-lt);color:var(--err);border:1px solid rgba(184,76,42,.2);}
.btn-full{width:100%;}
.btn-sm{padding:6px 12px;font-size:10px;}

/* MACRO BARS */
.mbar{margin-bottom:10px;}
.mbar-head{display:flex;justify-content:space-between;margin-bottom:4px;}
.mbar-lbl{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;}
.mbar-val{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;}
.mbar-val.over{color:var(--err);}
.mbar-track{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;}
.mbar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.16,1,.3,1);}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.donut-info{flex:1;min-width:160px;}
.legend{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.leg-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle;}
.leg-lbl{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;}

/* SUM GRID */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sum-cell{background:var(--s2);border-radius:8px;padding:10px 6px;text-align:center;border:1px solid var(--b1);}
.sum-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.sum-lbl{font-size:10px;color:var(--t3);margin-top:2px;}

/* MEAL CARD */
.meal-card{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.meal-desc{font-size:13px;color:var(--t1);line-height:1.4;margin:0;}
.meal-note{font-size:11px;color:var(--t3);font-style:italic;margin-top:3px;}
.meal-macros{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
.meal-macro{font-size:11px;font-family:'JetBrains Mono',monospace;}
.meal-del{background:none;border:none;cursor:pointer;color:var(--t3);font-size:20px;line-height:1;padding:0 2px;flex-shrink:0;transition:color .15s;}
.meal-del:hover{color:var(--err);}

/* SUPP PILLS */
.supp-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.supp-pill{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;padding:5px 11px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t2);cursor:pointer;transition:all .15s;}
.supp-pill.taken{background:var(--acc-lt);border-color:var(--acc);color:var(--acc);font-weight:500;}
.supp-pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.supp-group-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px;width:100%;}

/* SLOT TABS */
.slot-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.slot-tab{padding:10px 4px;border-radius:8px;border:1px solid var(--b1);cursor:pointer;font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;text-align:center;transition:all .15s;background:var(--s2);color:var(--t3);}
.slot-tab .slot-icon{font-size:18px;display:block;margin-bottom:3px;}
.slot-tab.active{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700;}

/* SUPP TABLE */
.supp-card{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.supp-card.inactive{opacity:.55;}
.supp-name-inp{background:none;border:none;color:var(--t1);font-size:14px;font-family:'Syne',sans-serif;font-weight:600;width:100%;padding:0;}
.supp-name-inp:focus{outline:none;}
.supp-slot-inp{background:var(--acc-lt);border:none;color:var(--acc);font-size:10px;font-family:'JetBrains Mono',monospace;border-radius:4px;padding:2px 7px;width:58px;}
.supp-slot-inp:focus{outline:1px solid var(--acc);}
.supp-note-inp{background:none;border:none;color:var(--t3);font-size:11px;font-family:'Syne',sans-serif;flex:1;}
.supp-note-inp:focus{outline:none;}
.macro-grid{display:grid;grid-template-columns:repeat(3,1fr) 1fr 1fr;gap:6px;margin-top:10px;}
.macro-cell{background:var(--s2);border-radius:6px;padding:8px 4px;text-align:center;border:1px solid var(--b1);}
.macro-cell-lbl{font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:4px;letter-spacing:.5px;}
.macro-cell-inp{background:none;border:none;color:var(--t1);font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;width:100%;text-align:center;padding:0;}
.macro-cell-inp:focus{outline:none;}
.check-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--b1);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.check-box.on{background:var(--acc);border-color:var(--acc);}
.check-mark{font-size:10px;color:#fff;font-weight:900;line-height:1;}

/* COST BANNER */
.cost-banner{background:var(--acc);border-radius:var(--r);padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;box-shadow:var(--shadow-md);}
.cost-main{font-size:30px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;}
.cost-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;}
.cost-right{text-align:right;}
.cost-per{font-size:12px;color:rgba(255,255,255,.85);font-family:'JetBrains Mono',monospace;}

/* SLOT FILTER */
.slot-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.slot-chip{padding:5px 13px;border-radius:20px;border:1px solid var(--b1);background:var(--s1);color:var(--t3);font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.slot-chip.active{background:var(--acc);color:#fff;border-color:var(--acc);}

/* RANGE TABS */
.range-tabs{display:flex;gap:6px;margin-bottom:16px;}
.range-tab{flex:1;padding:9px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);color:var(--t3);font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;text-align:center;transition:all .15s;box-shadow:var(--shadow);}
.range-tab.active{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700;}

/* REPORT */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.report-cell{background:var(--s2);border-radius:8px;padding:14px;text-align:center;border:1px solid var(--b1);}
.report-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.report-lbl{font-size:10px;color:var(--t3);margin-top:4px;}

/* MINI CHART */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:64px;margin-top:12px;}
.mini-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mini-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .4s ease;}
.mini-bar-lbl{font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace;}

/* HIST CARD */
.hist-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.hist-card:hover{border-color:var(--acc);box-shadow:var(--shadow-md);}
.hist-card.today{border-color:var(--acc);border-width:2px;}

/* ADVICE */
.advice-box{background:var(--acc-lt);border-radius:8px;padding:14px;border-left:3px solid var(--acc);margin-top:12px;}
.advice-text{font-size:13px;line-height:1.75;color:var(--t1);white-space:pre-wrap;}

/* TIMELINE */
.timeline-row{display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--b1);}
.timeline-row:last-child{border:none;padding:0;margin:0;}
.timeline-time{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--t3);min-width:44px;padding-top:1px;}
.timeline-main{font-size:13px;color:var(--t1);line-height:1.4;}
.timeline-sub{font-size:10px;color:var(--acc);font-family:'JetBrains Mono',monospace;margin-top:2px;}

/* DAY NAV */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.day-date{font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--t1);text-align:center;}
.day-today{font-size:10px;color:var(--acc);font-family:'JetBrains Mono',monospace;text-align:center;margin-top:1px;}

/* FASTING */
.fast-screen{text-align:center;padding:50px 20px;}
.fast-icon{font-size:56px;margin-bottom:16px;}

/* LOADING */
.loading{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUGGESTION BUTTON */
.sugg-btn{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:9px 11px;color:var(--t2);font-size:12px;cursor:pointer;text-align:left;font-family:'Syne',sans-serif;line-height:1.4;transition:all .15s;width:100%;display:block;margin-bottom:5px;}
.sugg-btn:hover{border-color:var(--acc);color:var(--t1);background:#fff;}

/* PRIO */
.prio-row{margin-bottom:14px;padding-left:14px;border-left:3px solid var(--b1);}
.prio-row.red{border-color:#B84C2A;}
.prio-row.orange{border-color:#C4880A;}
.prio-row.yellow{border-color:#8A9A2A;}
.prio-title{font-size:13px;color:var(--t1);margin-bottom:4px;font-weight:600;}
.prio-text{font-size:12px;color:var(--t2);line-height:1.7;}

/* TAG */
.tag{display:inline-block;font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.tag-ok{background:var(--acc-lt);color:var(--acc);}
.tag-warn{background:var(--carb-lt);color:var(--carb);}
.tag-off{background:var(--s3);color:var(--t3);}

/* SHAKE GROUP */
.shake-group{background:var(--acc-lt);border:1px solid rgba(42,122,111,.2);border-radius:8px;padding:10px 12px;margin-bottom:10px;}
.shake-title{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--acc);font-weight:600;margin-bottom:6px;letter-spacing:.5px;}
</style>
</head>
<body>

  <div id="header">
    <div class="h-inner">
      <div class="h-brand">Benessere &amp; Forma</div>
      <h1 class="h-title">Zona Tracker</h1>
    </div>
    <nav id="nav">
      <button class="nav-btn active" onclick="showPage('oggi')">🗓 Oggi</button>
      <button class="nav-btn" onclick="showPage('integratori')">💊 Integr.</button>

    <div id="page-storico"     class="page"></div>

</div>

function mealTotals(meals){
  return (meals||[]).reduce((a,m)=>({
    kcal:a.kcal+(m.kcal||0),protein:a.protein+(m.protein||0),
    carbs:a.carbs+(m.carbs||0),fat:a.fat+(m.fat||0)
  }),{kcal:0,protein:0,carbs:0,fat:0});
}
function suppTotalsForIds(ids){
  return ST.supps.filter(s=>(ids||[]).includes(s.id))
    .reduce((a,s)=>({kcal:a.kcal+s.kcal,protein:a.protein+s.protein,carbs:a.carbs+s.carbs,fat:a.fat+s.fat}),
    {kcal:0,protein:0,carbs:0,fat:0});
}
function activeSupps(){return ST.supps.filter(s=>s.active);}
function suppMonthlyCost(s){return(s.price&&s.doses)?(s.price/s.doses)*30:0;}
function totalMonthlyCost(){return activeSupps().reduce((a,s)=>a+suppMonthlyCost(s),0);}
function periodCost(range){return activeSupps().reduce((a,s)=>a+(s.price/s.doses),0)*range;}

const WORKER_URL = 'https://zona-ai.ignazioforma.workers.dev'; // update after Worker deploy

async function callAI(prompt) {
  const payload = {
    model:'claude-sonnet-4-20250514',max_tokens:300,
    messages:[{role:'user',content:prompt}]
  };
  // Try Cloudflare Worker first, fallback to direct (works on GitHub Pages with anthropic CORS headers)
  let url = WORKER_URL;
  let headers = {'Content-Type':'application/json'};
  try {
    const r = await fetch(url,{method:'POST',headers,body:JSON.stringify(payload)});
    if(!r.ok) throw new Error('worker fail');
    const d = await r.json();
    return (d.content||[]).find(b=>b.type==='text')?.text||'';
  } catch {
    // Direct call fallback
    const r2 = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const d2 = await r2.json();
    return (d2.content||[]).find(b=>b.type==='text')?.text||'';
  }
}

async function estimateMacros(desc) {
  const txt = await callAI(`Sei un nutrizionista esperto. Analizza questo pasto e stima i macronutrienti.\n\nPasto: "${desc}"\n\nRispondi SOLO con JSON valido, niente testo extra:\n{"kcal":number,"protein":number,"carbs":number,"fat":number,"notes":"nota breve in italiano"}\n\nUsa porzioni standard adulto attivo se non specificate.`);
  return JSON.parse(txt.replace(/\`\`\`json|\`\`\`/g,'').trim());
}

async function getAdvice(consumed, nextMeal) {
  const rem={
    kcal:Math.max(0,TARGET.kcal-consumed.kcal),
    protein:Math.max(0,TARGET.protein-consumed.protein),
    carbs:Math.max(0,TARGET.carbs-consumed.carbs),
    fat:Math.max(0,TARGET.fat-consumed.fat),
  };
  return await callAI(`Sei un nutrizionista esperto in dieta a Zona (40-30-30).\n\nMacro ancora disponibili oggi:\n- Calorie: ${rem.kcal} kcal\n- Proteine: ${rem.protein}g\n- Carboidrati: ${rem.carbs}g\n- Grassi: ${rem.fat}g\n\nProssimo pasto: ${nextMeal}\n\nProfilo: pescetariano (pesce + possibile uova), no latticini, no carne. Obiettivo: riduzione grasso addominale, ferritina bassa.\n\n2-3 suggerimenti concreti. Italiano, diretto. Max 120 parole.`);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function macroBar(label,current,target,color,unit='g'){
  const pct=Math.min(100,Math.round((current/target)*100));
  const over=current>target;
  return `<div class="mbar">
    <div class="mbar-head">
      <span class="mbar-lbl">${label}</span>
      <span class="mbar-val ${over?'over':''}">${current}${unit} / ${target}${unit}</span>
    </div>
    <div class="mbar-track"><div class="mbar-fill" style="width:${pct}%;background:${over?'var(--err)':color};"></div></div>
  </div>`;
}

function donutSVG(protein,carbs,fat,kcal){
  const total=protein+carbs+fat||1;
  const r=42,cx=58,cy=58,sw=13,circ=2*Math.PI*r;
  const cP=(carbs/total)*100,pP=(protein/total)*100,fP=(fat/total)*100;
  function seg(pct,off,col){
    const dash=(pct/100)*circ;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-(off*circ/100)}"
      style="transition:stroke-dasharray .5s ease" transform="rotate(-90 ${cx} ${cy})"/>`;
  }
  return `<svg width="116" height="116" viewBox="0 0 116 116">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--s3)" stroke-width="${sw}"/>
    ${seg(cP,0,'var(--carb)')}${seg(pP,cP,'var(--prot)')}${seg(fP,cP+pP,'var(--fat)')}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" fill="var(--t1)" font-size="16" font-weight="700" font-family="JetBrains Mono,monospace">${kcal}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="var(--t3)" font-size="9" font-family="JetBrains Mono,monospace">kcal</text>
  </svg>`;
}

function mealCardHTML(m){
  return `<div class="meal-card">
    <div style="flex:1;min-width:0;">
      <p class="meal-desc">${esc(m.description)}</p>
      ${m.notes?`<p class="meal-note">${esc(m.notes)}</p>`:''}
      <div class="meal-macros">
        <span class="meal-macro" style="color:var(--t2)"><b style="color:var(--t1)">${m.kcal}</b> kcal</span>
        <span class="meal-macro" style="color:var(--prot)"><b>${m.protein}g</b> P</span>
        <span class="meal-macro" style="color:var(--carb)"><b>${m.carbs}g</b> C</span>
        <span class="meal-macro" style="color:var(--fat)"><b>${m.fat}g</b> G</span>
        ${m.time?`<span class="meal-macro" style="color:var(--t3)">${m.time}</span>`:''}
      </div>
    </div>
    <button class="meal-del" onclick="deleteMeal('${ST.activeDay}',${m.id})">×</button>
  </div>`;
}

              <input class="supp-slot-inp" value="${esc(s.slot)}" onchange="updateSupp(${s.id},'slot',this.value)"/>
              ${s.group?`<span class="tag tag-ok">${esc(s.group)}</span>`:''}
              <input class="supp-note-inp" value="${esc(s.note||'')}" placeholder="nota..." onchange="updateSupp(${s.id},'note',this.value)"/>
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;margin-left:10px;flex-shrink:0;">
            <div class="check-box ${s.active?'on':''}" onclick="toggleSuppActive(${s.id})">
              ${s.active?'<span class="check-mark">✓</span>':''}
            </div>
            <button onclick="deleteSupp(${s.id})" style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:20px;line-height:1;padding:0;transition:color .15s;" onmouseover="this.style.color='var(--err)'" onmouseout="this.style.color='var(--t3)'">×</button>
          </div>
        </div>
        <div class="macro-grid">
          ${[['kcal','Kcal'],['protein','Prot g'],['carbs','Carbo g'],['fat','Grassi g'],['price','Prezzo €'],['doses','Dosi/conf']].map(([k,lbl])=>`
            <div class="macro-cell">
              <div class="macro-cell-lbl">${lbl}</div>
              <input type="number" class="macro-cell-inp" value="${s[k]||0}" onchange="updateSupp(${s.id},'${k}',+this.value)"/>
            </div>`).join('')}
        </div>
        <div style="margin-top:8px;text-align:right;">
          <span style="font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;">
            €${s.price&&s.doses?(s.price/s.doses).toFixed(2):'–'}/dose · €${suppMonthlyCost(s).toFixed(2)}/mese
          </span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });

  document.getElementById('page-integratori').innerHTML=html;
}

// PAGE: STORICO
// ═══════════════════════════════════════════════════════════
function renderStorico(){
  const days=Object.keys(ST.db.days).sort().reverse();
  const today=todayKey();
  const rangeDays=days.filter(d=>!ST.db.days[d]?.fasting).slice(0,ST.reportRange);

  let avgKcal=0,avgProt=0,avgCarbs=0,avgFat=0;
  if(rangeDays.length){
    rangeDays.forEach(d=>{
      const t=mealTotals(ST.db.days[d]?.meals||[]);
      avgKcal+=t.kcal;avgProt+=t.protein;avgCarbs+=t.carbs;avgFat+=t.fat;
    });
    avgKcal=Math.round(avgKcal/rangeDays.length);
    avgProt=Math.round(avgProt/rangeDays.length);
    avgCarbs=Math.round(avgCarbs/rangeDays.length);
    avgFat=Math.round(avgFat/rangeDays.length);
  }
  const adherence=rangeDays.length?Math.round(rangeDays.filter(d=>{
    const t=mealTotals(ST.db.days[d]?.meals||[]);
    return t.kcal>0&&Math.abs(t.kcal-TARGET.kcal)<300;
  }).length/rangeDays.length*100):0;
  const estCost=periodCost(ST.reportRange);
  const chartDays=Object.keys(ST.db.days).sort().slice(-14);
  const maxKcal=Math.max(...chartDays.map(d=>mealTotals(ST.db.days[d]?.meals||[]).kcal),TARGET.kcal,1);

  let html=`
    <div class="range-tabs">
      ${[7,14,30].map(r=>`<button class="range-tab ${ST.reportRange===r?'active':''}" onclick="setReportRange(${r})">${r} giorni</button>`).join('')}
    </div>`;

  if(rangeDays.length>0){
    html+=`<div class="card card-green">
      <span class="lbl">Report — ${ST.reportRange} giorni (${rangeDays.length} con pasti)</span>
      <div class="report-grid">
        <div class="report-cell"><div class="report-val" style="color:var(--acc)">${avgKcal}</div><div class="report-lbl">kcal media/giorno</div></div>
        <div class="report-cell"><div class="report-val" style="color:${adherence>=70?'var(--ok)':adherence>=40?'var(--warn)':'var(--err)'}">${adherence}%</div><div class="report-lbl">aderenza piano</div></div>
        <div class="report-cell"><div class="report-val" style="color:var(--prot)">${avgProt}g</div><div class="report-lbl">proteine medie</div></div>
        <div class="report-cell"><div class="report-val" style="color:var(--carb)">${avgCarbs}g</div><div class="report-lbl">carbo medi</div></div>
      </div>
      <div style="background:var(--s2);border-radius:8px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--b1);">
        <div>
          <div style="font-size:11px;color:var(--t3);margin-bottom:4px;">Costo integratori stimato (${ST.reportRange} gg)</div>
          <div style="font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--warn);">€ ${estCost.toFixed(2)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--t3);">Mensile stimato</div>
          <div style="font-size:16px;font-family:'JetBrains Mono',monospace;color:var(--t2);font-weight:600;">€ ${totalMonthlyCost().toFixed(2)}</div>
        </div>
      </div>
      ${chartDays.length>1?`
        <div style="margin-top:14px;">
          <div style="font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:6px;letter-spacing:1px;">ANDAMENTO CALORIE PASTI</div>
          <div class="mini-chart">
            ${chartDays.map(d=>{
              const k=mealTotals(ST.db.days[d]?.meals||[]).kcal;
              const h=Math.round((k/maxKcal)*55)+5;
              const col=ST.db.days[d]?.fasting?'var(--b1)':k>TARGET.kcal?'var(--err)':k>0?'var(--acc)':'var(--s3)';
              return `<div class="mini-bar-wrap">
                <div class="mini-bar" style="height:${h}px;background:${col};"></div>
                <div class="mini-bar-lbl">${new Date(d+'T12:00:00').getDate()}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`:''}
    </div>`;
  }

  html+=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span class="lbl" style="margin-bottom:0;">Tutti i giorni</span>
      <button class="btn btn-danger btn-sm" onclick="resetAll()">🗑 Elimina dati</button>
    </div>
    ${days.length===0?'<div class="card"><p style="color:var(--t3);font-size:13px;">Nessun dato ancora. Inizia dalla tab Oggi.</p></div>':''}
    ${days.map(day=>{
      const d=ST.db.days[day];
      const ms=d.meals||[];
      const tot=mealTotals(ms);
      const isT=day===today;
      return `<div class="hist-card ${isT?'today':''}" onclick="goToDay('${day}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${d.fasting||!ms.length?0:8}px;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:${isT?'var(--acc)':'var(--t1)'};">${fmtDate(day)}${isT?' · oggi':''}</span>
          ${d.fasting?'<span style="font-size:11px;color:var(--err);font-family:\'JetBrains Mono\',monospace;">⚡ digiuno</span>'
            :`<span style="font-size:12px;font-family:'JetBrains Mono',monospace;color:${tot.kcal>TARGET.kcal?'var(--err)':'var(--t3)'};">${tot.kcal} kcal · ${ms.length} pasti</span>`}
        </div>
        ${!d.fasting&&ms.length?`
          <div style="display:flex;gap:6px;">
            ${[['P',tot.protein,TARGET.protein,'var(--prot)'],['C',tot.carbs,TARGET.carbs,'var(--carb)'],['G',tot.fat,TARGET.fat,'var(--fat)']].map(([l,v,t,c])=>`
              <div style="flex:1;">
                <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
                  <span style="font-size:9px;color:${c};font-family:'JetBrains Mono',monospace;">${l}</span>
                  <span style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;">${v}g</span>
                </div>
                <div style="height:3px;border-radius:2px;background:var(--s3);">
                  <div style="height:100%;border-radius:2px;width:${Math.min(100,(v/t)*100)}%;background:${c};"></div>
                </div>
              </div>`).join('')}
          </div>`:''}
      </div>`;
    }).join('')}`;

  document.getElementById('page-storico').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function navDay(dir){
  const all=Object.keys(ST.db.days).sort();
  const idx=all.indexOf(ST.activeDay);
  const ni=idx+dir;
  if(ni>=0&&ni<all.length){ST.activeDay=all[ni];ST.advice='';renderOggi();}
}
function toggleFasting(){const d=getDay(ST.activeDay);d.fasting=!d.fasting;saveDB();renderOggi();}
function toggleSuppTaken(id){
  const d=getDay(ST.activeDay);
  const i=d.suppsTaken.indexOf(id);
  if(i>=0)d.suppsTaken.splice(i,1);else d.suppsTaken.push(id);
  saveDB();renderOggi();
}
function setLogSlot(id){ST.logSlot=id;renderOggi();}
function setSuggestion(i){
  ST.logText=SUGGESTED[ST.logSlot][i];
  renderOggi();
  setTimeout(()=>{const ta=document.getElementById('log-text');if(ta){ta.value=ST.logText;ta.focus();}},10);
}
async function logMeal(){
  const ta=document.getElementById('log-text');
  const text=(ta?.value||ST.logText).trim();
  if(!text) return;
  ST.logText=text;ST.logLoading=true;ST.logError='';renderOggi();
  try{
    const macros=await estimateMacros(text);
    const d=getDay(ST.activeDay);
    d.meals.push({id:Date.now(),slot:ST.logSlot,description:text,...macros,
      time:new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})});
    saveDB();ST.logText='';ST.logError='';
  }catch(e){ST.logError='Errore nella stima AI — '+e.message;}
  ST.logLoading=false;renderOggi();
}
function deleteMeal(dayKey,id){
  const d=ST.db.days[dayKey];if(!d)return;
  d.meals=d.meals.filter(m=>m.id!=id);saveDB();renderOggi();
}
async function fetchAdvice(){
  const d=getDay(ST.activeDay);
  const mTot=mealTotals(d.meals||[]);
  const sTot=suppTotalsForIds(d.suppsTaken||[]);
  const cons={kcal:mTot.kcal+sTot.kcal,protein:mTot.protein+sTot.protein,carbs:mTot.carbs+sTot.carbs,fat:mTot.fat+sTot.fat};
  ST.advLoading=true;ST.advice='';renderOggi();
  try{ST.advice=await getAdvice(cons,MEAL_SLOTS.find(s=>s.id===ST.nextSlot)?.label||ST.nextSlot);}
  catch(e){ST.advice='Errore AI: '+e.message;}
  ST.advLoading=false;renderOggi();
}
function setSuppFilter(f){ST.suppFilter=f;renderIntegratori();}
function toggleSuppActive(id){const s=ST.supps.find(s=>s.id===id);if(s){s.active=!s.active;saveSupps();renderIntegratori();}}
function updateSupp(id,key,val){const s=ST.supps.find(s=>s.id===id);if(s){s[key]=val;saveSupps();}}
function addSupp(){
  const newId=Math.max(...ST.supps.map(s=>s.id),0)+1;
  ST.supps.push({id:newId,name:'Nuovo integratore',slot:'08:30',group:'',active:true,kcal:0,protein:0,carbs:0,fat:0,price:0,doses:30,note:''});
  saveSupps();renderIntegratori();
}
function deleteSupp(id){if(confirm('Eliminare questo integratore?')){ST.supps=ST.supps.filter(s=>s.id!==id);saveSupps();renderIntegratori();}}
function resetSupps(){if(confirm('Ripristinare la lista di default?')){ST.supps=J(DEFAULT_SUPPS);saveSupps();renderIntegratori();}}
function setReportRange(r){ST.reportRange=r;renderStorico();}
function goToDay(day){ST.activeDay=day;ST.advice='';showPage('oggi');}
function resetAll(){if(confirm('Eliminare tutti i dati? Azione irreversibile.')){ST.db={days:{}};saveDB();renderStorico();}}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
getDay(todayKey());
saveDB();
renderOggi();
</script>
