<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Zona Tracker — Accesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#2A7A6F;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  padding:32px 24px;
  text-align:center;
}
.logo{
  width:72px;height:72px;border-radius:20px;
  background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-family:'Arial Black',sans-serif;
  font-size:26px;font-weight:900;color:#fff;
  margin-bottom:20px;
  letter-spacing:-1px;
}
h1{font-size:22px;font-weight:800;margin-bottom:10px;letter-spacing:-.3px;}
.sub{font-size:14px;color:rgba(255,255,255,.75);line-height:1.65;max-width:290px;margin:0 auto;}
.spinner{
  width:34px;height:34px;
  border:3px solid rgba(255,255,255,.25);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:24px auto 0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stato successo */
.success-icon{font-size:52px;margin:0 auto 16px;display:none;}
.open-btn{
  display:none;
  margin-top:28px;
  background:#fff;
  color:#2A7A6F;
  font-weight:800;
  font-size:15px;
  padding:15px 32px;
  border-radius:12px;
  text-decoration:none;
  border:none;cursor:pointer;
  letter-spacing:-.2px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  transition:transform .15s,box-shadow .15s;
}
.open-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(0,0,0,.1);}
.hint{
  display:none;
  margin-top:14px;
  font-size:11px;
  color:rgba(255,255,255,.55);
  font-family:monospace;
  letter-spacing:.3px;
}

/* Stato errore */
.err-box{
  background:rgba(0,0,0,.22);
  border-radius:12px;
  padding:14px 18px;
  margin-top:20px;
  font-size:13px;
  color:rgba(255,255,255,.85);
  max-width:300px;
  display:none;
  line-height:1.55;
}
.retry-btn{
  display:none;
  margin-top:20px;
  background:rgba(255,255,255,.15);
  color:#fff;
  font-size:13px;
  font-weight:600;
  padding:11px 24px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.3);
  cursor:pointer;
  text-decoration:none;
}
</style>
</head>
<body>

<div class="logo">ZT</div>
<div class="success-icon" id="success-icon">✅</div>
<h1 id="title">Verifica in corso…</h1>
<p class="sub" id="msg">Stiamo completando l'accesso.<br>Ci vorranno pochi secondi.</p>
<div class="spinner" id="spinner"></div>
<div class="err-box" id="err-box"></div>

<!-- Pulsante principale: apre la PWA/app -->
<a class="open-btn" id="open-btn" href="./zona-tracker.html">
  Apri Zona Tracker →
</a>
<div class="hint" id="hint">Tocca per aprire l'app</div>

<!-- Fallback: torna alla pagina di login -->
<a class="retry-btn" id="retry-btn" href="./zona-tracker.html">
  Torna al login →
</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://qxiyeiahpoiliwpqslpr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cuyDYC3WzaNGqGRs_J-JnQ_7kZ2B4to';

// Usa flowType: 'pkce' per compatibilità massima con tutti i browser/PWA
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    flowType: 'pkce',
    detectSessionInUrl: true,
    persistSession: true,
    autoRefreshToken: true,
  }
});

async function handleCallback() {
  // 1. Prova a leggere i token dall'hash (formato implicito, vecchio stile)
  const hash = window.location.hash.replace(/^#/, '');
  const hashParams = new URLSearchParams(hash);
  const accessToken  = hashParams.get('access_token');
  const refreshToken = hashParams.get('refresh_token');

  // 2. Prova a leggere il code dall'URL (formato PKCE, nuovo stile)
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');

  let session = null;

  if (accessToken && refreshToken) {
    // Flusso implicito: imposta la sessione direttamente
    const { data, error } = await supa.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });
    if (!error && data?.session) session = data.session;

  } else if (code) {
    // Flusso PKCE: exchangeCodeForSession gestisce tutto
    const { data, error } = await supa.auth.exchangeCodeForSession(
      window.location.href
    );
    if (!error && data?.session) session = data.session;

  } else {
    // Nessun parametro: controlla se c'è già una sessione attiva
    const { data } = await supa.auth.getSession();
    if (data?.session) session = data.session;
  }

  if (session) {
    showSuccess();
  } else {
    showError('Nessun token trovato. Il link potrebbe essere scaduto o già usato. Torna all\'app e richiedi un nuovo Magic Link.');
  }
}

function showSuccess() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('success-icon').style.display = 'block';
  document.getElementById('title').textContent = 'Accesso completato! ✓';
  document.getElementById('msg').textContent = 'Ora puoi tornare a Zona Tracker.\nSe hai la PWA installata, aprila dall\'icona sulla schermata home.';

  const btn = document.getElementById('open-btn');
  const hint = document.getElementById('hint');
  btn.style.display = 'inline-block';
  hint.style.display = 'block';

  // Pulisci l'URL dai token per sicurezza
  history.replaceState(null, '', window.location.pathname);
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'Ops!';
  document.getElementById('msg').textContent = 'Si è verificato un problema con il login.';
  const box = document.getElementById('err-box');
  box.style.display = 'block';
  box.textContent = msg;
  document.getElementById('retry-btn').style.display = 'inline-block';
}

handleCallback();
</script>
</body>
</html>
